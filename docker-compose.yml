services:
  redis:
    image: redis:7-alpine
    container_name: rag_mind_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    mem_limit: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_mind_backend
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
      MILVUS_URI: ${MILVUS_URI}
      MILVUS_TOKEN: ${MILVUS_TOKEN}
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      HF_HOME: /app/storage/huggingface
      TRANSFORMERS_CACHE: /app/storage/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/storage/huggingface/sentence_transformers
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/huggingface:/app/storage/huggingface
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    mem_limit: 900m

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_mind_worker
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
      MILVUS_URI: ${MILVUS_URI}
      MILVUS_TOKEN: ${MILVUS_TOKEN}
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      HF_HOME: /app/storage/huggingface
      TRANSFORMERS_CACHE: /app/storage/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/storage/huggingface/sentence_transformers
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./storage/huggingface:/app/storage/huggingface
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=1
    mem_limit: 700m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: rag_mind_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    mem_limit: 256m

volumes:
  redis_data:
