version: '3.9'

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: bash -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - '8000:8000'
    environment:
      - APP_ENV=dev
      - DB_URL=sqlite:///./rag_mind.db
      - MILVUS_URI=${MILVUS_URI}
      - MILVUS_TOKEN=${MILVUS_TOKEN}
      - MILVUS_DB_NAME=${MILVUS_DB_NAME:-default}

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: bash -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
